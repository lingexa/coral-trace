name: task

on:
  schedule:
    - cron: '0 8 * * *'
    - cron: '0 20 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download word history (if exists)
        uses: actions/download-artifact@v4
        id: download-history
        continue-on-error: true
        with:
          name: word-history
          path: output/history/

      - name: Initialize history if not found
        run: |
          mkdir -p output/history output/backgrounds
          if [ ! -f "output/history/all_generated_words.json" ]; then
            echo '{"words": [], "last_updated": null}' > output/history/all_generated_words.json
            echo "Created new word history file"
          else
            echo "Loaded existing word history"
            word_count=$(python -c "import json; print(len(json.load(open('output/history/all_generated_words.json'))['words']))")
            echo "History contains $word_count words"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies and fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-noto fonts-noto-core fonts-liberation
          
          # Verify fonts are installed
          echo "Checking installed fonts..."
          fc-list | grep -i "Noto Sans" | head -10
          
          # List available font files
          echo "Noto font files:"
          find /usr/share/fonts -name "*.ttf" | grep -i "noto" | head -20
          
          # Install a reliable fallback font
          echo "Installing Liberation fonts as fallback..."
          fc-list | grep -i "Liberation" | head -5
          
          echo "✅ Fonts ready for Lingexa!"
          
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ -f "upload/requirements.txt" ]; then
            pip install -r upload/requirements.txt
          fi
          echo "All dependencies installed"

      - name: Create .env file from secrets
        run: |
          echo "POLLINATIONS_API_KEY=${{ secrets.POLLINATIONS_API_KEY }}" >> .env
          echo "AI_MODEL=gemini-fast" >> .env
          echo "" >> .env
          echo "# YouTube" >> .env
          echo "YT_CLIENT_ID=${{ secrets.YT_CLIENT_ID }}" >> .env
          echo "YT_CLIENT_SECRET=${{ secrets.YT_CLIENT_SECRET }}" >> .env
          echo "YT_REFRESH_TOKEN=${{ secrets.YT_REFRESH_TOKEN }}" >> .env
          echo "" >> .env
          echo "# Instagram" >> .env
          echo "INSTAGRAM_ACCESS_TOKEN=${{ secrets.INSTAGRAM_ACCESS_TOKEN }}" >> .env
          echo "INSTAGRAM_ACCOUNT_ID=${{ secrets.INSTAGRAM_ACCOUNT_ID }}" >> .env
          echo "" >> .env
          echo "# Facebook" >> .env
          echo "FACEBOOK_ACCESS_TOKEN=${{ secrets.FACEBOOK_ACCESS_TOKEN }}" >> .env
          echo "FACEBOOK_PAGE_ID=${{ secrets.FACEBOOK_PAGE_ID }}" >> .env
          echo "" >> .env
          echo "# Twitter/X" >> .env
          echo "TWITTER_API_KEY=${{ secrets.TWITTER_API_KEY }}" >> .env
          echo "TWITTER_API_SECRET=${{ secrets.TWITTER_API_SECRET }}" >> .env
          echo "TWITTER_ACCESS_TOKEN=${{ secrets.TWITTER_ACCESS_TOKEN }}" >> .env
          echo "TWITTER_ACCESS_SECRET=${{ secrets.TWITTER_ACCESS_SECRET }}" >> .env
          echo "" >> .env
          echo "# VK" >> .env
          echo "VK_ACCESS_TOKEN=${{ secrets.VK_ACCESS_TOKEN }}" >> .env
          echo "VK_GROUP_ID=${{ secrets.VK_GROUP_ID }}" >> .env
          echo "" >> .env
          echo "# Telegram" >> .env
          echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" >> .env
          echo "TELEGRAM_CHANNEL_ID=${{ secrets.TELEGRAM_CHANNEL_ID }}" >> .env
          echo "" >> .env
          echo "# Threads" >> .env
          echo "THREADS_ACCESS_TOKEN=${{ secrets.THREADS_ACCESS_TOKEN }}" >> .env
          echo "THREADS_USER_ID=${{ secrets.THREADS_USER_ID }}" >> .env
          echo "" >> .env
          echo "# TikTok" >> .env
          echo "TIKTOK_ACCESS_TOKEN=${{ secrets.TIKTOK_ACCESS_TOKEN }}" >> .env
          echo "" >> .env
          echo "# Timezone" >> .env
          echo "TIMEZONE_OFFSET_HOURS=-5" >> .env
          echo ".env file created"

      - name: Generate Lingexa Vocabulary Reel
        run: |
          echo "Starting Lingexa content generation..."
          python lingexa_bot.py
          echo "Content generation complete!"
          echo ""
          echo "Generated files:"
          ls -la output/video/ || echo "No video directory yet"

      - name: Upload to All Social Media Platforms
        run: |
          echo "Starting multi-platform upload..."
          export PYTHONPATH="${{ github.workspace }}:${{ github.workspace }}/upload:$PYTHONPATH"
          python upload_all_platforms.py
          echo "Upload complete!"

      - name: Upload video artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lingexa-reel-${{ github.run_number }}
          path: |
            output/video/*/final_reel.mp4
            output/video/*/metadata.json
          retention-days: 7

      - name: Upload logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: logs-${{ github.run_number }}
          path: |
            output/history/*.json
            output/upload_results_*.json
          retention-days: 7

      - name: Upload word history (for persistence)
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: word-history
          path: |
            output/history/all_generated_words.json
          retention-days: 90
          overwrite: true

      - name: Commit word history to repository
        if: success()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -f output/history/all_generated_words.json
          if ! git diff --staged --quiet; then
            git commit -m "Update word history - Run #${{ github.run_number }}"
            git push
            echo "Word history committed - NO repeats across runs!"
          else
            echo "No changes to commit"
          fi